server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  # Proxy Stalwart APIs and Web UI
  location /admin/ { proxy_pass http://stalwart:8080/admin/; }
  location /admin { proxy_pass http://stalwart:8080/admin; }
  location /assets/ { proxy_pass http://stalwart:8080/assets/; }
  location /api/ { proxy_pass http://stalwart:8080/api/; }
  location /jmap/ { proxy_pass http://stalwart:8080/jmap/; }
}
