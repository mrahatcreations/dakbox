server {
  listen 80;
  
  # Docker internal DNS resolver. This prevents Nginx from crashing on startup
  # if the 'stalwart' container isn't fully ready yet.
  resolver 127.0.0.11 valid=10s;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # Proxy to the Stalwart backend using environment variable
    proxy_pass ${STALWART_INTERNAL_URL}/api/;
    proxy_ssl_server_name on;
  }

  location /jmap/ {
    proxy_pass ${STALWART_INTERNAL_URL}/jmap/;
    proxy_ssl_server_name on;
  }
}
