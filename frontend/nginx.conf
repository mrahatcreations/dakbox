server {
  listen 80;
  
  # Docker internal DNS resolver. This prevents Nginx from crashing on startup
  # if the 'stalwart' container isn't fully ready yet.
  resolver 127.0.0.11 valid=10s;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    set $backend "http://stalwart:8080";
    # Need to rewrite the path because proxy_pass with variable doesn't append the path automatically in the same way
    rewrite ^/api/(.*) /api/$1 break;
    proxy_pass $backend;
  }

  location /jmap/ {
    set $backend "http://stalwart:8080";
    rewrite ^/jmap/(.*) /jmap/$1 break;
    proxy_pass $backend;
  }
}
