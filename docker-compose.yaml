services:
  stalwart:
    image: stalwartlabs/mail-server:latest
    container_name: stalwart
    ports:
      - "25:25"     # SMTP
      - "143:143"   # IMAP
      - "465:465"   # SMTP TLS
      - "587:587"   # SMTP StartTLS
      - "993:993"   # IMAP TLS
    expose:
      - "8080"      # Tell Coolify/Traefik proxy to use this port for HTTP
    volumes:
      - stalwart-etc-v3:/opt/stalwart-mail/etc
      - stalwart-data-v3:/opt/stalwart-mail/data
      - stalwart-logs-v3:/opt/stalwart-mail/logs
    environment:
      - STALWART_RECOVERY_ADMIN=${ADMIN_MAIL:-admin@localhost}:${ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: webmail
    depends_on:
      - stalwart
    restart: unless-stopped

volumes:
  stalwart-etc-v3:
  stalwart-data-v3:
  stalwart-logs-v3:
