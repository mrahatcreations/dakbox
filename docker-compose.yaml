services:
  stalwart:
    image: stalwartlabs/mail-server:v0.11
    container_name: stalwart
    ports:
      - "25:25"     # SMTP
      - "143:143"   # IMAP
      - "465:465"   # SMTP TLS
      - "587:587"   # SMTP StartTLS
      - "993:993"   # IMAP TLS
    expose:
      - "8080"      # Tell Coolify/Traefik proxy to use this port for HTTP
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stalwart-admin.rule=Host(`${STALWART_DOMAIN}`)"
      - "traefik.http.routers.stalwart-admin.entrypoints=https"
      - "traefik.http.routers.stalwart-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.stalwart-admin.loadbalancer.server.port=8080"
    volumes:
      - stalwart-etc-v2:/opt/stalwart/etc
      - stalwart-data-v2:/opt/stalwart/data
      - stalwart-logs-v2:/opt/stalwart/logs
    environment:
      - STALWART_RECOVERY_ADMIN=${ADMIN_MAIL:-admin@localhost}:${ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: webmail
    depends_on:
      - stalwart
    restart: unless-stopped

volumes:
  stalwart-etc-v2:
  stalwart-data-v2:
  stalwart-logs-v2:
