services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart
    ports:
      - "25:25"     # SMTP
      - "143:143"   # IMAP
      - "465:465"   # SMTP TLS
      - "587:587"   # SMTP StartTLS
      - "993:993"   # IMAP TLS
    expose:
      - "8080"      # Tell Coolify/Traefik proxy to use this port for HTTP
    volumes:
      - stalwart-etc-v3:/opt/stalwart-mail/etc
      - stalwart-data-v3:/opt/stalwart-mail/data
      - stalwart-logs-v3:/opt/stalwart-mail/logs
    restart: unless-stopped

  frontend:
    image: ghcr.io/mrahatcreations/dakbox-frontend:latest
    container_name: webmail
    depends_on:
      - stalwart
    restart: unless-stopped

volumes:
  stalwart-etc-v3:
  stalwart-data-v3:
  stalwart-logs-v3:
